<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #333;
}

input {
    padding: 10px;
    width: 200px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 15px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #00c6ff;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: white;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
    border-radius: 5px;
    cursor: pointer;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<h1>My To-Do List</h1>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") {
        alert("Please enter a task");
        return;
    }

    let li = document.createElement("li");
    li.innerText = task;

    li.onclick = function() {
        this.remove();
    };

    document.getElementById("taskList").appendChild(li);
    input.value = "";
}
</script>

</body>
</html>
